name: CI

on:
  push:
    branches: ["main", "ai/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-learning-app:
    name: Learning portal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: learning-app
        run: npm install

      - name: Build
        working-directory: learning-app
        run: npm run build
